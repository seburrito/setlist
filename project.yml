name: Setlist
options:
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    ENABLE_PREVIEWS: YES
targets:
  Setlist:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.setlist.app
        PRODUCT_NAME: Setlist
schemes:
  Setlist:
    build:
      targets:
        Setlist: all
    run:
      config: Debug
